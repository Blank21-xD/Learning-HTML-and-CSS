<! background color=rgb (red, green, blue) max value=255 if all 255 then the color is white>

  <style>
    .subscribe-button {
      background-color: rgb(170, 5, 5);
      color: white;
      border: none;

      border-radius: 5px;
      cursor: pointer;
      margin-right: 8px;
      margin-left: 20px;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 16px;
      padding-right: 10px;
      transition: opacity 0.15s;
      vertical-align: top;
    }

    .subscribe-button:hover {
      opacity: 0.7;
    }

    .subscribe-button:active {
      opacity: 0.4;
    }

    .join-button {
      background-color: white;
      border-color: rgb(5, 5, 166);
      border-style: solid;
      border-width: 1px;
      color: rgb(5, 5, 166);
      height: 37px;
      width: 62px;
      border-radius: 3px;
      cursor: pointer;
      padding-left: 30px;
      padding-top: 20px;
      transition: background-color 1s;
      color 1s;
      padding-top: 9px;
      padding-bottom: 9px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .join-button:hover {
      background-color: rgb(5, 5, 166);
      color: white;
    }


    .join-button:active {
      opacity: 0.4;
    }


    .tweet-button {
      background-color: rgb(13, 13, 190);
      color: white;
      border: none;
      height: 36px;
      width: 68px;
      border-radius: 18px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin-left: 8px;
      transition: box-shadow 0.15s;
      vertical-align: top;


    }

    .tweet-button:hover {
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);

    }
  </style>



  <button class="subscribe-button">
    SUBSCRIBE
  </button>

  <button class="join-button">
    JOIN
  </button>

  <button class="tweet-button">
    Tweet
  </button>
